
    <div class="users-list">
      <div class="header">
        <h1>Gestion des utilisateurs</h1>
        <button mat-raised-button color="primary" routerLink="/users/new">
          <mat-icon>add</mat-icon>
          Ajouter un utilisateur
        </button>
      </div>

      <mat-card>
        <mat-card-content>
          <div class="table-container">
            <table mat-table [dataSource]="users" class="users-table">
              
              <!-- Colonne ID -->
              <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let user">{{user.id}}</td>
              </ng-container>

              <!-- Colonne Nom complet -->
              <ng-container matColumnDef="fullName">
                <th mat-header-cell *matHeaderCellDef>Nom complet</th>
                <td mat-cell *matCellDef="let user">
                  <div class="user-info">
                    <strong>{{user.firstName}} {{user.lastName}}</strong>
                    <div class="user-email">{{user.email}}</div>
                  </div>
                </td>
              </ng-container>

              <!-- Colonne Rôle -->
              <ng-container matColumnDef="role">
                <th mat-header-cell *matHeaderCellDef>Rôle</th>
                <td mat-cell *matCellDef="let user">
                  <mat-chip [color]="user.role === 'Admin' ? 'primary' : 'accent'">
                    {{user.role}}
                  </mat-chip>
                </td>
              </ng-container>

              <!-- Colonne Statut -->
              <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>Statut</th>
                <td mat-cell *matCellDef="let user">
                  <mat-chip [color]="user.status === 'Active' ? 'primary' : 'warn'">
                    {{user.status}}
                  </mat-chip>
                </td>
              </ng-container>

              <!-- Colonne Date de création -->
              <ng-container matColumnDef="createdAt">
                <th mat-header-cell *matHeaderCellDef>Créé le</th>
                <td mat-cell *matCellDef="let user">
                  {{formatDate(user.createdAt)}}
                </td>
              </ng-container>

              <!-- Colonne Actions -->
              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let user">
                  <div class="action-buttons">
                    <button mat-icon-button 
                            color="primary"
                            [routerLink]="['/users/edit', user.id]"
                            matTooltip="Modifier">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button 
                            color="warn"
                            (click)="deleteUser(user)"
                            matTooltip="Supprimer">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
          </div>

          <div *ngIf="users.length === 0" class="no-data">
            <mat-icon>people_outline</mat-icon>
            <p>Aucun utilisateur trouvé</p>
            <button mat-raised-button color="primary" routerLink="/users/new">
              Ajouter le premier utilisateur
            </button>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
