
    <div class="users-form">
      <div class="header">
        <button mat-icon-button (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h1>{{isEditMode ? 'Modifier' : 'Ajouter'}} un utilisateur</h1>
      </div>

      <mat-card>
        <mat-card-content>
          <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
            <div class="form-row">
              <mat-form-field class="form-field">
                <mat-label>Prénom</mat-label>
                <input matInput 
                       formControlName="firstName"
                       placeholder="Prénom de l'utilisateur">
                <mat-error *ngIf="userForm.get('firstName')?.hasError('required')">
                  Le prénom est requis
                </mat-error>
              </mat-form-field>

              <mat-form-field class="form-field">
                <mat-label>Nom</mat-label>
                <input matInput 
                       formControlName="lastName"
                       placeholder="Nom de l'utilisateur">
                <mat-error *ngIf="userForm.get('lastName')?.hasError('required')">
                  Le nom est requis
                </mat-error>
              </mat-form-field>
            </div>

            <mat-form-field class="full-width">
              <mat-label>Email</mat-label>
              <input matInput 
                     type="email"
                     formControlName="email"
                     placeholder="email@exemple.com">
              <mat-error *ngIf="userForm.get('email')?.hasError('required')">
                L'email est requis
              </mat-error>
              <mat-error *ngIf="userForm.get('email')?.hasError('email')">
                Format d'email invalide
              </mat-error>
            </mat-form-field>

            <div class="form-row">
              <mat-form-field class="form-field">
                <mat-label>Rôle</mat-label>
                <mat-select formControlName="role">
                  <mat-option value="Admin">Administrateur</mat-option>
                  <mat-option value="User">Utilisateur</mat-option>
                  <mat-option value="Manager">Manager</mat-option>
                </mat-select>
                <mat-error *ngIf="userForm.get('role')?.hasError('required')">
                  Le rôle est requis
                </mat-error>
              </mat-form-field>

              <mat-form-field class="form-field">
                <mat-label>Statut</mat-label>
                <mat-select formControlName="status">
                  <mat-option value="Active">Actif</mat-option>
                  <mat-option value="Inactive">Inactif</mat-option>
                </mat-select>
                <mat-error *ngIf="userForm.get('status')?.hasError('required')">
                  Le statut est requis
                </mat-error>
              </mat-form-field>
            </div>

            <div class="form-actions">
              <button mat-button 
                      type="button" 
                      (click)="goBack()">
                Annuler
              </button>
              <button mat-raised-button 
                      color="primary" 
                      type="submit"
                      [disabled]="userForm.invalid || isLoading">
                {{isLoading ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer')}}
              </button>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
