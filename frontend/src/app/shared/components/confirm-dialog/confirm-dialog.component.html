<div class="modal-overlay" [class.open]="true">
  <div class="modal">
    <div class="modal-header" [ngClass]="actionTypeClass">
      <svg
        class="modal-icon"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
        [style.color]="iconColorStyle.color"
      >
        <ng-container [ngSwitch]="data.actionType || 'warning'">
          <ng-container *ngSwitchCase="'delete'">
            <path
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </ng-container>
          <ng-container *ngSwitchCase="'warning'">
            <path
              d="M12 9v2m0 4v2m-6-4a9 9 0 1118 0 9 9 0 01-18 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </ng-container>
          <ng-container *ngSwitchCase="'success'">
            <path
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </ng-container>
          <ng-container *ngSwitchCase="'info'">
            <path
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </ng-container>
          <ng-container *ngSwitchCase="'error'">
            <path
              d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </ng-container>
          <ng-container *ngSwitchDefault>
            <path
              d="M12 9v2m0 4v2m-6-4a9 9 0 1118 0 9 9 0 01-18 0z"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </ng-container>
        </ng-container>
      </svg>
      <span class="modal-title">{{ data.title }}</span>
    </div>

    <div class="modal-body">
      <p>{{ data.message }}</p>
    </div>

    <div class="modal-actions">
      <button type="button" class="nav-link" (click)="onCancel()">
        {{ data.cancelText || "Annuler" }}
      </button>
      <button
        type="button"
        class="nav-link"
        [class.danger]="data.actionType === 'delete'"
        [style.background-color]="confirmButtonStyle.backgroundColor"
        [style.color]="confirmButtonStyle.color"
        [style.border-color]="confirmButtonStyle.borderColor"
        (click)="onConfirm()"
      >
        {{ data.confirmText || "Confirmer" }}
      </button>
    </div>
  </div>
</div>
