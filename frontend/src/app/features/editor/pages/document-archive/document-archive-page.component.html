<div class="document-archive-page app-page">
  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
    <p>Chargement de l'archive...</p>
  </div>

  <nav class="topnav">
    <div class="nav-logo">
      <svg
        class="nav-logo__icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
        <path d="M6 12v5c3 3 9 3 12 0v-5" />
      </svg>
      <div class="tlogo-text">SIRH-<span>Doc</span></div>
    </div>

    <div class="nav-center">
      <span class="nav-org-pill">{{ organizationName || "Archive" }}</span>
      <app-active-academic-year-pill></app-active-academic-year-pill>
    </div>

    <div class="nav-right">
      <button class="nav-action-btn" type="button" (click)="goBack()">
        <i class="fa fa-arrow-left"></i>
        Retour
      </button>
      <app-user-menu></app-user-menu>
    </div>
  </nav>

  <div class="bottomnav archive-filters" [formGroup]="filterForm">
    <label class="filter-label">
      <i class="fa fa-th-large filter-icon"></i>
      <select formControlName="familyId" (change)="onFilterChange()">
        <option value="">Toutes les familles</option>
        <option *ngFor="let family of families" [value]="family.id">
          {{ family.nom || family.name || family.id }}
        </option>
      </select>
    </label>

    <div class="filter-divider"></div>

    <label class="filter-label">
      <i class="fa fa-id-card filter-icon"></i>
      <select formControlName="beneficiaryKey" (change)="onFilterChange()">
        <option value="">Tous les beneficiaires</option>
        <option
          *ngFor="let beneficiary of beneficiaryOptions"
          [value]="beneficiary.key"
        >
          {{ beneficiary.label }}
        </option>
      </select>
    </label>

    <div class="filter-divider"></div>

    <label class="filter-label" *ngIf="isAdminArchive">
      <i class="fa fa-user filter-icon"></i>
      <select formControlName="generatedById" (change)="onFilterChange()">
        <option value="">Tous les generateurs</option>
        <option
          *ngFor="let generator of generatorOptions"
          [value]="generator.id"
        >
          {{ generator.label }}
        </option>
      </select>
    </label>

    <div class="filter-divider" *ngIf="isAdminArchive"></div>

    <label class="filter-label filter-label--search">
      <i class="fa fa-search filter-icon"></i>
      <input
        formControlName="query"
        placeholder="Archive, bénéficiaire, table..."
        (input)="onFilterChange()"
      />
    </label>

    <div class="filter-divider"></div>

    <label class="filter-label">
      <i class="fa fa-calendar filter-icon"></i>
      <input
        type="date"
        formControlName="dateFrom"
        (change)="onFilterChange()"
      />
    </label>

    <span class="filter-range-sep">à</span>

    <label class="filter-label">
      <input type="date" formControlName="dateTo" (change)="onFilterChange()" />
    </label>

    <div class="filter-divider"></div>

    <button type="button" class="reset-btn" (click)="resetFilters()">
      <i class="fa fa-times"></i>
      Réinitialiser
    </button>
  </div>

  <main class="app-shell" *ngIf="!loading">
    <section
      class="card-grid archive-card-grid"
      *ngIf="tableGroups.length; else emptyState"
    >
      <button
        class="module-card archive-module-card"
        type="button"
        *ngFor="let group of tableGroups"
        [class.organization-card]="group.isOrganization"
        (click)="openGroup(group)"
      >
        <div class="module-card__header">
          <div class="module-card__left">
            <i
              class="fa"
              [class.fa-building]="group.isOrganization"
              [class.fa-table]="!group.isOrganization"
            ></i>
          </div>
          <div class="archive-card-count">
            <strong>{{ group.documents.length }}</strong>
            <span>arch.</span>
          </div>
        </div>

        <div class="module-card__footer">
          <span class="module-card__title">
            {{ group.label }}
            <small>{{ getGroupSubtitle(group) }}</small>
          </span>
          <span class="module-card__arrow">
            <i class="fa fa-arrow-circle-right"></i>
          </span>
        </div>

        <div class="archive-card-meta">
          <span>{{
            getFamilyNames(group.familyIds) || "Toutes les familles"
          }}</span>
          <span *ngIf="!group.isOrganization">
            {{ group.beneficiaries.length }} bénéficiaire(s)
          </span>
        </div>
      </button>
    </section>
  </main>

  <ng-template #emptyState>
    <div class="empty-state">
      <i class="fa fa-folder-open"></i>
      <p>Aucun module ne correspond aux filtres actuels.</p>
    </div>
  </ng-template>
</div>
