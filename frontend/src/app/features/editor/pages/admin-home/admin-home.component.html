<div class="admin-home">
  <div class="loading-overlay" *ngIf="loading">
    <div class="spinner"></div>
    <p>Chargement de l'espace administrateur...</p>
  </div>

  <nav class="topnav">
    <div class="nav-logo">SIRH-<span>Doc</span></div>
    <div class="nav-sep"></div>
    <span class="nav-chip">ADMIN</span>
    <span class="nav-organization">{{ organizationName }}</span>
    <div class="nav-right">
      <button class="nav-link" type="button" (click)="logout()">
        Déconnexion
      </button>
    </div>
  </nav>

  <section class="card-grid">
    <button
      class="launch-card launch-card--core"
      type="button"
      *ngFor="let card of quickCards"
      (click)="card.action()"
    >
      <div class="launch-card__top">
        <div class="launch-card__icon">{{ card.icon }}</div>
        <div class="launch-card__pointer" aria-hidden="true">☝</div>
      </div>
      <div class="launch-card__footer">
        <div class="launch-card__label">{{ card.title }}</div>
        <div class="launch-card__chevron" aria-hidden="true">›</div>
      </div>
    </button>

    <button
      class="launch-card launch-card--module"
      type="button"
      *ngFor="let module of modules"
      (click)="openModule(module)"
    >
      <div class="launch-card__top">
        <div class="launch-card__icon">{{ module.icon || "🧩" }}</div>
        <div class="launch-card__pointer" aria-hidden="true">☝</div>
      </div>
      <div class="launch-card__footer">
        <div class="launch-card__label">{{ module.name }}</div>
        <div class="launch-card__chevron" aria-hidden="true">›</div>
      </div>
    </button>
  </section>

  <div class="empty-state empty-state--inline" *ngIf="!modules.length">
    Aucun module métier n'est disponible pour cette organisation.
  </div>
</div>
