<div class="ay-config-page">
  <nav class="topnav">
    <div class="nav-logo">
      <div class="tlogo-text">SIRH-<span>Doc</span></div>
    </div>
    <div class="nav-center">
      <span class="nav-org-pill">Configuration annees universitaires</span>
    </div>
    <div class="nav-right">
      <button class="ghost-btn" type="button" (click)="router.navigate(['/super-admin'])">Retour</button>
      <app-user-menu></app-user-menu>
    </div>
  </nav>

  <main class="config-shell">
    <section class="config-panel">
      <header class="section-header">
        <div>
          <h1>Tables affectees par l'annee universitaire</h1>
          <p>Choisis l'organisation, puis les tables et colonnes a filtrer pour admin et user.</p>
        </div>
        <button class="primary-btn" type="button" [disabled]="saving || !config" (click)="save()">
          Enregistrer
        </button>
      </header>

      <label class="field">
        Organisation
        <select [(ngModel)]="selectedOrganizationId" (change)="onOrganizationChange()">
          <option *ngFor="let org of organizations" [value]="org.id">
            {{ org.nom || org.name || org.id }} - {{ org.databaseName }}
          </option>
        </select>
      </label>

      <div class="loading-box" *ngIf="loading">Chargement...</div>

      <ng-container *ngIf="!loading && config">
        <div class="grid-4">
          <label class="field">
            Table des annees
            <select [(ngModel)]="config.academicYearTable">
              <option *ngFor="let table of tables" [value]="table.name">{{ table.name }}</option>
            </select>
          </label>
          <label class="field">
            Colonne code
            <select [(ngModel)]="config.codeColumn">
              <option *ngFor="let column of columnsFor(config.academicYearTable)" [value]="column.name">
                {{ column.name }}
              </option>
            </select>
          </label>
          <label class="field">
            Date debut
            <select [(ngModel)]="config.startDateColumn">
              <option [ngValue]="null">Aucune</option>
              <option *ngFor="let column of columnsFor(config.academicYearTable)" [value]="column.name">
                {{ column.name }}
              </option>
            </select>
          </label>
          <label class="field">
            Statut
            <select [(ngModel)]="config.statusColumn">
              <option [ngValue]="null">Aucune</option>
              <option *ngFor="let column of columnsFor(config.academicYearTable)" [value]="column.name">
                {{ column.name }}
              </option>
            </select>
          </label>
        </div>

        <label class="field end-date-field">
          Date fin
          <select [(ngModel)]="config.endDateColumn">
            <option [ngValue]="null">Aucune</option>
            <option *ngFor="let column of columnsFor(config.academicYearTable)" [value]="column.name">
              {{ column.name }}
            </option>
          </select>
        </label>

        <div class="add-row">
          <select [(ngModel)]="selectedTableToAdd">
            <option value="">Ajouter une table a filtrer</option>
            <option *ngFor="let table of availableTables" [value]="table.name">{{ table.name }}</option>
          </select>
          <button class="ghost-btn" type="button" [disabled]="!selectedTableToAdd" (click)="addAffectedTable()">
            Ajouter
          </button>
        </div>

        <div class="mapping-list">
          <div class="mapping-row" *ngFor="let item of config.affectedTables; let i = index">
            <strong>{{ item.tableName }}</strong>
            <select [(ngModel)]="item.yearColumn">
              <option value="">Colonne annee</option>
              <option *ngFor="let column of columnsFor(item.tableName)" [value]="column.name">
                {{ column.name }}
              </option>
            </select>
            <button class="danger-btn" type="button" (click)="removeAffectedTable(i)">Retirer</button>
          </div>
        </div>
      </ng-container>
    </section>
  </main>
</div>
