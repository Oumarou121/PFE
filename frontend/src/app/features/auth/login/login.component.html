<div class="shell">
  <section class="hero">

      <h1>Connexion par rﾃδｴle</h1>

  <section class="card">

    <form id="loginForm" (ngSubmit)="onSubmit()">
      <label for="identifier">E-mail</label>
      <input
        id="identifier"
        name="identifier"
        type="email"
        autocomplete="email"
        required
        [(ngModel)]="credentials.email"
      />
      <label for="password">Mot de passe</label>
      <input
        id="password"
        name="password"
        type="password"
        autocomplete="current-password"
        required

      />
      <button type="submit">Ouvrir la session</button>
      <div class="error" id="loginError">{{ loginError }}</div>
    </form>
  </section>
</div>
